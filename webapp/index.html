<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <!-- cache-control: принудительное обновление на GitHub Pages -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>🪙 Кликер</title>

  <!-- Telegram WebApp SDK (обязательно до всего остального) -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Стили (версионирование через ?v= для обхода кэша GitHub Pages) -->
  <link rel="stylesheet" href="style.css?v=2">
</head>
<body>

<!-- ══════════════════════════════════════════════════════════════
     Оверлей: оффлайн-бонус
     ══════════════════════════════════════════════════════════════ -->
<div id="offline-overlay" class="hidden">
  <div class="offline-card">
    <h2>🌙 Пока вас не было...</h2>
    <div class="bonus-amount" id="offline-amount">+0 🪙</div>
    <p>Ваши помощники не теряли времени.<br>Забирайте монеты!</p>
    <button id="offline-claim-btn">Забрать бонус</button>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════════
     Шапка: баланс + мини-статистика
     ══════════════════════════════════════════════════════════════ -->
<header id="app-header">
  <div class="coin-display">
    <span class="coin-icon">🪙</span>
    <span class="coin-count" id="coin-count">0</span>
  </div>
  <div class="header-stats">
    <div class="header-stat">👆 <span id="header-click">1</span>/клик</div>
    <div class="header-stat">⚡ <span id="header-cps">0</span>/сек</div>
  </div>
</header>

<!-- ══════════════════════════════════════════════════════════════
     Навигация по вкладкам
     ══════════════════════════════════════════════════════════════ -->
<nav id="tabs-nav">
  <button class="tab-btn active" data-tab="clicker">
    <span class="tab-icon">🖱️</span>
    Кликер
  </button>
  <button class="tab-btn" data-tab="shop">
    <span class="tab-icon">🛒</span>
    Магазин
  </button>
  <button class="tab-btn" data-tab="stats">
    <span class="tab-icon">📊</span>
    Статистика
  </button>
</nav>

<!-- ══════════════════════════════════════════════════════════════
     Контент вкладок
     ══════════════════════════════════════════════════════════════ -->
<div id="tab-content">

  <!-- ── Вкладка: Кликер ──────────────────────────────────────── -->
  <div id="tab-clicker" class="tab-panel active">

    <div class="click-area">
      <button id="click-btn" aria-label="Кликнуть">🪙</button>
    </div>

    <div class="clicker-info">
      <p>👆 Сила клика: <span id="info-click">1</span></p>
      <p>⚡ Авто-доход: <span id="info-auto">0</span>/сек</p>
      <p>✖️ Множитель: <span id="info-multi">×1.00</span></p>
    </div>

    <div class="level-progress">
      <div class="level-bar-header">
        <span id="level-text">Уровень 1</span>
        <span id="level-next">0 / 1,000</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="level-fill" style="width:0%"></div>
      </div>
    </div>

  </div>

  <!-- ── Вкладка: Магазин ─────────────────────────────────────── -->
  <div id="tab-shop" class="tab-panel">
    <div id="shop-content">
      <!-- Заполняется через renderShop() в JS -->
    </div>
  </div>

  <!-- ── Вкладка: Статистика ──────────────────────────────────── -->
  <div id="tab-stats" class="tab-panel">

    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">💰 Баланс</div>
        <div class="stat-value" id="stat-balance">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">👆 Сила клика</div>
        <div class="stat-value blue" id="stat-click">1</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">⚡ Авто/сек</div>
        <div class="stat-value green" id="stat-auto">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">✖️ Множитель</div>
        <div class="stat-value" id="stat-multi">×1.00</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">🖱️ Всего кликов</div>
        <div class="stat-value blue" id="stat-total-clicks">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">🏦 Всего заработано</div>
        <div class="stat-value" id="stat-total-earned">0</div>
      </div>
    </div>

    <div class="achievements-section">
      <h3>🏆 Достижения</h3>
      <div id="achievements-list">
        <!-- Заполняется через checkAchievements() в JS -->
      </div>
    </div>

  </div>

</div>

<!-- ══════════════════════════════════════════════════════════════
     Тост-уведомления
     ══════════════════════════════════════════════════════════════ -->
<div id="toast-container"></div>

<!-- Скрипт (версионирование для обхода кэша) -->
<script src="script.js?v=2"></script>

</body>
</html>
